{% extends 'store/base.html' %}

{% block content %}

<style>
    .auth-wrap {
        display: grid;
        min-height: calc(100vh - 190px);
        grid-template-columns: minmax(0, 1fr) minmax(320px, 430px);
        gap: 34px;
        align-items: center;
    }

    .auth-card {
        padding: 28px;
    }

    .auth-card form p {
        margin-bottom: 16px;
    }

    @media (max-width: 820px) {
        .auth-wrap {
            grid-template-columns: 1fr;
        }
    }
</style>

<section class="auth-wrap">
    <div>
        <div class="section-kicker">Welcome back</div>
        <h1 class="page-title mt-2">Sign in to continue shopping.</h1>
        <p class="page-copy mt-4 mb-0">
            Access your cart, keep browsing the catalog, and complete checkout from one clean dashboard.
        </p>
    </div>

    <div class="auth-card">
        <h2 class="h3 fw-bold mb-4">Login</h2>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="btn-store btn-primary-store w-100 mt-2">
                Login
            </button>
        </form>

        <p class="text-center muted-copy mt-4 mb-0">
            Don't have an account?
            <a href="{% url 'sign_up' %}">Sign up</a>
        </p>
    </div>
</section>

{% endblock %}
